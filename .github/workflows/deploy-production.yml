name: Deploy to Production

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build-and-deploy-production:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Retag staging image to latest
        run: |
          docker pull minifrizz/diving-o-club-backend:staging
          docker tag minifrizz/diving-o-club-backend:staging minifrizz/diving-o-club-backend:latest
          docker push minifrizz/diving-o-club-backend:latest

          docker pull minifrizz/diving-o-club-frontend:staging
          docker tag minifrizz/diving-o-club-frontend:staging minifrizz/diving-o-club-frontend:latest
          docker push minifrizz/diving-o-club-frontend:latest

      - name: Write .env.production on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_PRODUCTION
          script: |
            printf '%s' "$ENV_PRODUCTION" > ~/Diving-O-Club_App/app/.env.production

      - name: Deploy to EC2 PRODUCTION via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Diving-O-Club_App

            echo "🧹 Cleaning old Docker data..."
            sudo docker image prune -af

            echo "↪️ Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "🎆 Pulling images from Docker Hub..."
            cd app
            sudo docker compose -f docker-compose.production.yml --env-file .env.production pull

            echo "🔄 Stopping PRODUCTION containers..."
            sudo docker compose -f docker-compose.production.yml --env-file .env.production down

            echo "🚀 Starting PRODUCTION services..."
            sudo docker compose -f docker-compose.production.yml --env-file .env.production up -d

            echo "⏳ Waiting for services to be healthy..."
            sleep 15

            echo "🗄️ Running migrations..."
            sudo docker compose -f docker-compose.production.yml --env-file .env.production exec -T backend npm run migration:run

            echo "📊 PRODUCTION Services status:"
            sudo docker compose -f docker-compose.production.yml --env-file .env.production ps

            echo "🔍 PRODUCTION Health check:"
            sudo docker compose -f docker-compose.production.yml --env-file .env.production exec -T postgres pg_isready -U diving_admin || echo "⚠️ PostgreSQL not ready yet"
            sudo docker compose -f docker-compose.production.yml --env-file .env.production exec -T mongodb mongosh --eval "db.adminCommand('ping')" || echo "⚠️ MongoDB not ready yet"

            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx

            echo "✅ PRODUCTION Deployment complete!"
            echo "🌐 Access production at: https://divingoclub.com"
            echo "📋 Logs: sudo docker compose -f docker-compose.production.yml logs -f"
