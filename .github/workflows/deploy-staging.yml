name: Deploy to Staging

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  build-and-deploy-staging:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Debug PR refs
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "merged=${{ github.event.pull_request.merged }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t minifrizz/diving-o-club-backend:staging ./app/backend
          docker push minifrizz/diving-o-club-backend:staging

      - name: Build and push frontend image
        run: |
          docker build \
            --no-cache \
            --build-arg NEXT_PUBLIC_API_URL=https://staging.divingoclub.com/api \
            -t minifrizz/diving-o-club-frontend:staging \
            ./app/frontend
          docker push minifrizz/diving-o-club-frontend:staging

      - name: Create .env.staging locally
        run: echo "${{ secrets.ENV_STAGING }}" > .env.staging

      - name: Copy .env.staging to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".env.staging"
          target: "/home/ubuntu/Diving-O-Club_App/app/"

      - name: Deploy to EC2 STAGING via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Diving-O-Club_App

            echo "↪️ Pulling latest changes..."
            git fetch origin develop
            git reset --hard origin/develop

            echo "🔄 Stopping STAGING containers..."
            cd app
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging down

            echo "🗑️ Removing old frontend image to force re-pull..."
            sudo docker image rm minifrizz/diving-o-club-frontend:staging || true

            echo "🧹 Cleaning old Docker data..."
            sudo docker image prune -af

            echo "🎆 Pulling images from Docker Hub..."
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging pull

            echo "🚀 Starting STAGING services..."
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

            echo "⏳ Waiting for services to be healthy..."
            sleep 15

            echo "🗄️ Running migrations..."
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T backend-staging npm run migration:run

            echo "🌱 Resetting and seeding database..."
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T postgres-staging psql -U diving_admin -d diving_o_club_staging -c "TRUNCATE role, club, app_user, membership, event RESTART IDENTITY CASCADE;" || echo "⚠️ Tables may not exist yet"
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T backend-staging npm run seed

            echo "📊 STAGING Services status:"
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging ps

            echo "🔍 STAGING Health check:"
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T postgres-staging pg_isready -U diving_admin || echo "⚠️ PostgreSQL not ready yet"
            sudo docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T mongodb-staging mongosh --eval "db.adminCommand('ping')" || echo "⚠️ MongoDB not ready yet"

            echo "🔧 Updating Nginx config..."
            sudo cp ~/Diving-O-Club_App/nginx/staging.divingoclub.com /etc/nginx/sites-enabled/staging.divingoclub.com
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ STAGING Deployment complete!"
            echo "🌐 Access staging at: https://staging.divingoclub.com"